name: Build APK

# Builds a debug APK on every push and on manual trigger.
# Download the result from the run's Artifacts section.
#
# This runs on GitHub's Ubuntu runners which already have Java 17 and the
# Android SDK pre-installed, so we don't pay any setup cost.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:    # lets you trigger manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The runner already has the Android SDK; this action just makes sure
      # the right command-line tools and platform-tools are available.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        # We don't ship gradle-wrapper.jar in the repo (it's binary). The
        # `gradle` command is on the runner, so we use it to produce a
        # wrapper compatible with our build.gradle.kts version.
        run: gradle wrapper --gradle-version 8.10 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PocketLinux-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
